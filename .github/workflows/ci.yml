name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      # i18n 静的検査: ハードコード日本語の新規混入検出（ベースライン方式）＋ ja/en 翻訳キーの対称性検査。
      # 失敗したら以下で対応する:
      #   - 内容確認:      node scripts/check-hardcoded-japanese.mjs --report
      #   - 意図的な残存:  node scripts/check-hardcoded-japanese.mjs --update-baseline でベースラインを棚卸し
      #   - 見落とし:      該当文字列を翻訳キー化して修正
      - name: i18n check
        run: npm run i18n:check

      - name: Firestore security rules
        run: npm run test:rules

      - name: Build
        # VITE_FIREBASE_* 環境変数が無くても import.meta.env 参照のみなら vite build は通る
        run: npm run build
